---
- name: Configure Nginx with SSL on Windows
  hosts: all

  tasks:
    - name: Install Chocolatey
      ansible.windows.win_powershell:
        script: |
          if (-not (Test-Path "C:\ProgramData\chocolatey\bin\choco.exe")) {
            [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
            $progressPreference = 'SilentlyContinue'
            iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          }

    - name: Install Nginx, NSSM and AWS CLI
      win_chocolatey:
        name:
          - nginx
          - nssm
          - awscli
        state: present

    - name: Find nginx install directory
      ansible.windows.win_powershell:
        script: |
          $dir = (Get-ChildItem "C:\tools" -Filter "nginx-*" -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName
          if (-not $dir) { throw "nginx dir not found under C:\tools" }
          $Ansible.Result = $dir
      register: nginx_dir_result

    - name: Set nginx dir fact
      set_fact:
        nginx_dir: "{{ nginx_dir_result.result }}"

    - name: Create SSL directory
      win_file:
        path: "{{ nginx_dir }}\\ssl"
        state: directory

    - name: Deploy Nginx HTTPS config
      win_template:
        src: templates/nginx.conf.j2
        dest: "{{ nginx_dir }}\\conf\\nginx.conf"

    - name: Deploy welcome page
      win_template:
        src: templates/index.html.j2
        dest: "{{ nginx_dir }}\\html\\index.html"

    - name: Stop nginx if already running
      win_service:
        name: nginx
        state: stopped
      ignore_errors: true

    - name: Register nginx as Windows service via NSSM if not already registered
      ansible.windows.win_powershell:
        script: |
          $nginxDir = '{{ nginx_dir }}'
          $svc = Get-Service -Name nginx -ErrorAction SilentlyContinue
          if (-not $svc) {
            & nssm install nginx "$nginxDir\nginx.exe"
            & nssm set nginx AppDirectory "$nginxDir"
          }
          # Restart automatically on any exit; retry every 5 seconds
          & nssm set nginx AppExit Default Restart
          & nssm set nginx AppRestartDelay 5000

    - name: Start nginx service
      win_service:
        name: nginx
        state: started
        start_mode: auto
      ignore_errors: true

    - name: Open firewall for HTTPS
      ansible.windows.win_powershell:
        script: |
          netsh advfirewall firewall add rule name="Nginx-HTTPS" protocol=TCP dir=in localport=443 action=allow

    - name: Stamp nginx install path into AMI for user-data to consume
      win_copy:
        dest: "C:\\nginx-dir.txt"
        content: "{{ nginx_dir }}"

    - name: Ensure SSM agent is installed and set to auto-start
      ansible.windows.win_powershell:
        script: |
          $svc = Get-Service -Name AmazonSSMAgent -ErrorAction SilentlyContinue
          if (-not $svc) {
            $msi = "$env:TEMP\AmazonSSMAgentSetup.exe"
            Invoke-WebRequest -Uri "https://s3.amazonaws.com/ec2-downloads-windows/SSMAgent/latest/windows_amd64/AmazonSSMAgentSetup.exe" `
              -OutFile $msi -UseBasicParsing
            Start-Process -FilePath $msi -ArgumentList "/S" -Wait
            Remove-Item $msi -Force
          }
          Set-Service -Name AmazonSSMAgent -StartupType Automatic
          Start-Service -Name AmazonSSMAgent -ErrorAction SilentlyContinue

    - name: Reset EC2Launch v2 so user-data runs on first boot from this AMI
      ansible.windows.win_powershell:
        script: |
          & "C:\Program Files\Amazon\EC2Launch\EC2Launch.exe" reset --clean
