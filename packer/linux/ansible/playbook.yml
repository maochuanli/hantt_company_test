---
- name: Configure Nginx with SSL
  hosts: all
  become: true

  tasks:
    - name: Install nginx and SSM agent
      dnf:
        name:
          - nginx
          - amazon-ssm-agent
        state: present

    - name: Enable SSM agent
      systemd:
        name: amazon-ssm-agent
        enabled: true

    - name: Deploy Nginx HTTPS config
      template:
        src: templates/https.conf.j2
        dest: /etc/nginx/conf.d/https.conf
        mode: "0644"

    - name: Remove default Nginx HTTP config
      file:
        path: /etc/nginx/conf.d/default.conf
        state: absent

    - name: Deploy welcome page
      template:
        src: templates/index.html.j2
        dest: /usr/share/nginx/html/index.html
        mode: "0644"

    - name: Enable Nginx (cert fetched from Secrets Manager at first boot via user-data)
      systemd:
        name: nginx
        enabled: true
