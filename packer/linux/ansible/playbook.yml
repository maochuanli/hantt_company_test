---
- name: Configure Nginx with SSL
  hosts: all
  become: true

  tasks:
    - name: Install nginx
      dnf:
        name: nginx
        state: present

    - name: Create SSL directory
      file:
        path: /etc/nginx/ssl
        state: directory
        mode: "0700"

    - name: Upload SSL certificate
      copy:
        src: "{{ playbook_dir }}/../../shared/ssl/server.crt"
        dest: /etc/nginx/ssl/server.crt
        mode: "0644"

    - name: Upload SSL private key
      copy:
        src: "{{ playbook_dir }}/../../shared/ssl/server.key"
        dest: /etc/nginx/ssl/server.key
        mode: "0600"

    - name: Deploy Nginx HTTPS config
      template:
        src: templates/https.conf.j2
        dest: /etc/nginx/conf.d/https.conf
        mode: "0644"

    - name: Remove default Nginx HTTP config
      file:
        path: /etc/nginx/conf.d/default.conf
        state: absent

    - name: Deploy welcome page
      template:
        src: templates/index.html.j2
        dest: /usr/share/nginx/html/index.html
        mode: "0644"

    - name: Enable and start Nginx
      shell: systemctl enable --now nginx
